<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tag, Chief</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  /* Mafia Online palette */
  --red:#c0392b; --red-dark:#922b21;
  --accent:#2d6a4f; --accent-dark:#1b4332; --accent-bright:#3a8c65; --accent-hover:#40916c;
  --header:#1a3d2b; --header-border:rgba(45,106,79,0.6);
  --bg:#2d3436; --bg2:#242b27; --bg3:#1e2821;
  --card:#3a3f3c; --card2:#454b47; --card-border:rgba(255,255,255,0.10);
  --text:#f0f0f0; --muted:#a0a8a4; --border:rgba(255,255,255,0.10); --input:rgba(0,0,0,0.25);
  --gold:#f39c12; --green:#27ae60; --green-bright:#2ecc71; --blue:#3498db;
  --reg-green:#2ecc71;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; overflow:hidden; }

/* BG */
.bg-layer { position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,106,79,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 20% 80%,rgba(27,67,50,.15) 0%,transparent 50%),var(--bg); z-index:0; pointer-events:none; }
.bg-grid { position:fixed; inset:0; background-image:linear-gradient(rgba(45,106,79,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(45,106,79,.06) 1px,transparent 1px); background-size:40px 40px; z-index:0; pointer-events:none; }

/* PAGES */
.page { display:none; position:fixed; inset:0; z-index:10; flex-direction:column; align-items:center; overflow-y:auto; overflow-x:hidden; }
.page.active { display:flex; }

/* TOAST */
#toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--card-border); border-radius:8px; padding:12px 20px; font-size:14px; font-weight:600; letter-spacing:.5px; white-space:nowrap; z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); max-width:90vw; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.5); }
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.success { border-color:rgba(46,204,113,.4); color:#2ecc71; }
#toast.error { border-color:rgba(192,57,43,.4); color:#e74c3c; }
#toast.info { border-color:rgba(52,152,219,.4); color:#3498db; }

/* LOADING */
#page-loading { background:var(--bg2); justify-content:center; gap:20px; }
.load-logo { width:80px; height:80px; border-radius:50%; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size:40px; animation:spin 3s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:6px; }
.load-bar-wrap { width:160px; height:3px; background:rgba(0,0,0,.3); border-radius:3px; overflow:hidden; }
.load-bar { height:100%; background:var(--accent); animation:loadbar 2s ease-in-out forwards; }
@keyframes loadbar { from{width:0%} to{width:100%} }

/* ── AUTH PAGE ────────────────────────── */
#page-auth { background:var(--bg2); padding:0 24px 32px; justify-content:flex-start; }
.auth-top { width:100%; max-width:400px; padding:20px 0 0; }
.title-bar { background:var(--header); border:1px solid var(--header-border); border-radius:6px; padding:10px 24px; text-align:center; position:relative; overflow:hidden; }
.title-bar::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
.title-bar h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; text-shadow:0 0 20px rgba(45,106,79,.5); }
.title-bar h1 span { color:var(--accent-bright); }
.logo-section { margin:24px 0 20px; display:flex; flex-direction:column; align-items:center; }
.logo-ring { width:110px; height:110px; border-radius:50%; border:2px solid rgba(45,106,79,.6); display:flex; align-items:center; justify-content:center; position:relative; animation:pulse-ring 3s ease-in-out infinite; }
.logo-ring::before { content:''; position:absolute; inset:-6px; border-radius:50%; border:1px solid rgba(45,106,79,.25); animation:pulse-ring 3s ease-in-out infinite .5s; }
@keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(45,106,79,.2)} 50%{box-shadow:0 0 20px 4px rgba(45,106,79,.35)} }
.logo-inner { width:90px; height:90px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:48px; }
.card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:24px; position:relative; overflow:hidden; margin-bottom:32px; box-shadow:0 4px 20px rgba(0,0,0,.4); }
.card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(45,106,79,.7),transparent); }
.tabs { display:flex; margin-bottom:24px; border-radius:6px; overflow:hidden; border:1px solid rgba(0,0,0,.3); background:rgba(0,0,0,.2); }
.tab { flex:1; padding:10px; text-align:center; font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; background:transparent; color:var(--muted); border:none; transition:all .2s; }
.tab.active { background:var(--accent); color:white; border-radius:4px; }
.form { display:none; flex-direction:column; gap:16px; }
.form.active { display:flex; }
.field-group { display:flex; flex-direction:column; gap:6px; }
.field-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.field-input { background:rgba(0,0,0,.25); border:1px solid var(--card-border); border-radius:6px; padding:12px 14px; font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:500; color:var(--text); outline:none; transition:all .2s; width:100%; -webkit-appearance:none; }
.field-input:focus { border-color:rgba(45,106,79,.7); background:rgba(45,106,79,.08); box-shadow:0 0 0 3px rgba(45,106,79,.15); }
.field-input::placeholder { color:rgba(255,255,255,.25); }
.btn-primary { width:100%; padding:14px; background:var(--accent); border:none; border-radius:6px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:white; cursor:pointer; transition:all .2s; margin-top:4px; box-shadow:0 3px 12px rgba(0,0,0,.3); }
.btn-primary:active { transform:scale(.98); background:var(--accent-dark); }
.btn-primary.loading { pointer-events:none; opacity:.7; }
.btn-google { width:100%; padding:12px; background:rgba(255,255,255,.07); border:1px solid var(--card-border); border-radius:6px; font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; letter-spacing:1px; color:var(--text); cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-google:active { transform:scale(.98); }
.divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:12px; letter-spacing:1px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.forgot-link { text-align:right; margin-top:-8px; }
.forgot-link a { font-size:12px; color:var(--muted); text-decoration:none; letter-spacing:1px; cursor:pointer; }
.forgot-link a:hover { color:var(--accent-bright); }
.forgot-panel { display:none; flex-direction:column; gap:16px; }
.forgot-panel.active { display:flex; }
.back-link { font-size:12px; color:var(--muted); cursor:pointer; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.back-link:hover { color:var(--accent-bright); }
.err-text { font-size:12px; color:#e74c3c; letter-spacing:.5px; display:none; }
.err-text.show { display:block; }
.success-screen { display:none; flex-direction:column; align-items:center; gap:16px; text-align:center; padding:16px 0; }
.success-screen.active { display:flex; }
.success-icon { width:64px; height:64px; border-radius:50%; background:rgba(46,204,113,.1); border:2px solid rgba(46,204,113,.4); display:flex; align-items:center; justify-content:center; font-size:28px; }
.success-screen h3 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:3px; }
.success-screen p { font-size:14px; color:var(--muted); line-height:1.6; }
.gicon { width:18px; height:18px; }

/* ── MAIN PAGE ───────────────────────── */
#page-main { background:var(--bg); }
.main-title-bar { width:100%; background:var(--header); border-bottom:2px solid var(--header-border); padding:12px 16px; flex-shrink:0; box-shadow:0 2px 10px rgba(0,0,0,.4); }
.main-title-inner { display:flex; align-items:center; justify-content:center; position:relative; }
.main-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:4px; text-shadow:0 0 20px rgba(45,106,79,.5); }
.main-title span { color:var(--accent-bright); }
.comm-icons { position:absolute; right:0; display:flex; gap:8px; }
.comm-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; transition:transform .2s; }
.comm-icon:active { transform:scale(.9); }
.comm-icon svg { width:18px; height:18px; }
.discord-ic { background:#5865F2; color:white; }
.telegram-ic { background:#229ED9; color:white; }
.lv-bar-wrap { width:100%; display:flex; align-items:center; gap:8px; padding:8px 16px 0; background:var(--header); }
.lv-num { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--accent-bright); min-width:24px; }
.lv-bar { flex:1; height:8px; background:rgba(0,0,0,.35); border-radius:4px; position:relative; overflow:visible; border:1px solid rgba(0,0,0,.3); }
.lv-fill { height:100%; background:linear-gradient(90deg,var(--accent-dark),var(--accent-bright)); border-radius:4px; transition:width .5s; }
.lv-xp { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:9px; font-weight:700; color:rgba(255,255,255,.6); letter-spacing:.5px; white-space:nowrap; pointer-events:none; }
.main-user-sec { width:100%; display:flex; align-items:flex-start; justify-content:space-between; padding:16px 16px 0; }
.main-left { display:flex; flex-direction:column; gap:8px; padding-top:8px; }
.icon-btn { width:40px; height:40px; background:var(--card); border:1px solid var(--card-border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); transition:all .2s; box-shadow:0 2px 6px rgba(0,0,0,.3); }
.icon-btn:active { background:rgba(45,106,79,.25); border-color:var(--accent); color:var(--accent-bright); }
.icon-btn svg { width:18px; height:18px; }
.pfp-sec { display:flex; flex-direction:column; align-items:center; gap:6px; }
.pfp-ring { width:90px; height:90px; border-radius:50%; border:2px solid rgba(45,106,79,.6); display:flex; align-items:center; justify-content:center; animation:pulse-ring 3s ease-in-out infinite; }
.pfp { width:76px; height:76px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:36px; overflow:hidden; cursor:pointer; }
.pfp img { width:100%; height:100%; object-fit:cover; }
.main-uname { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; cursor:pointer; }
.main-uname:active { color:var(--accent-bright); }
.coin-box { display:flex; flex-direction:column; align-items:center; gap:4px; background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:10px 14px; min-width:70px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.coin-box .ci { font-size:18px; }
.coin-box .cv { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; color:var(--gold); }
.coin-box .cv.neg { color:var(--red); }
.online-txt { font-size:11px; font-weight:600; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin:16px 0 4px; }
.play-btn { width:calc(100% - 48px); max-width:320px; padding:18px; background:var(--accent); border:none; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:6px; color:white; cursor:pointer; transition:all .2s; margin:8px 0 10px; box-shadow:0 4px 20px rgba(27,67,50,.5); position:relative; overflow:hidden; }
.play-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%); }
.play-btn:active { transform:scale(.97); background:var(--accent-dark); }
.pub-chat-btn { width:calc(100% - 80px); max-width:260px; padding:12px; background:var(--card); border:1px solid var(--card-border); border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px; color:var(--text); cursor:pointer; transition:all .2s; box-shadow:0 2px 8px rgba(0,0,0,.25); }
.pub-chat-btn:active { border-color:var(--accent); color:var(--accent-bright); }
.profile-circle-btn { position:absolute; right:20px; font-size:20px; width:44px; height:44px; border-radius:50%; background:var(--card); border:1px solid var(--card-border); cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:-44px; z-index:3; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.main-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:calc(100% - 48px); max-width:320px; margin-top:16px; }
.grid-btn { padding:14px 8px; background:var(--accent); border:none; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:white; cursor:pointer; transition:all .2s; box-shadow:0 3px 10px rgba(0,0,0,.3); }
.grid-btn:active { transform:scale(.97); background:var(--accent-dark); }
.creator-msg { width:calc(100% - 48px); max-width:320px; margin-top:16px; padding:10px 16px; background:rgba(0,0,0,.2); border:1px solid var(--card-border); border-radius:6px; font-size:12px; font-style:italic; color:var(--muted); text-align:center; letter-spacing:.5px; }
.logout-btn { padding:8px 16px; background:transparent; border:1px solid rgba(192,57,43,.4); border-radius:6px; font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); cursor:pointer; transition:all .2s; margin-top:16px; }
.logout-btn:active { border-color:var(--red); color:var(--red); }

/* ── SUB PAGES (shared header) ──────── */
.sub-page-wrap { width:100%; flex:1; display:flex; flex-direction:column; }
.sub-header { width:100%; background:var(--header); border-bottom:2px solid var(--header-border); padding:14px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; box-shadow:0 2px 10px rgba(0,0,0,.4); }
.back-btn { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.08); border:1px solid var(--card-border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text); font-size:18px; flex-shrink:0; }
.back-btn:active { border-color:var(--accent); color:var(--accent-bright); }
.sub-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; }
.sub-content { flex:1; padding:16px; overflow-y:auto; background:var(--bg); }

/* ── PLAY / ROOMS PAGE ───────────────── */
.rooms-header-info { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.rooms-count { font-size:13px; color:var(--muted); letter-spacing:1px; }
.filter-row { display:flex; gap:8px; margin-bottom:16px; }
.filter-btn { padding:6px 14px; background:var(--card); border:1px solid var(--card-border); border-radius:20px; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--muted); cursor:pointer; transition:all .2s; }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:white; }
.room-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all .2s; box-shadow:0 2px 8px rgba(0,0,0,.25); }
.room-card:active { border-color:var(--accent); background:rgba(45,106,79,.12); }
.room-card.in-progress { opacity:.5; cursor:default; }
.room-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.room-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
.room-status { font-size:11px; font-weight:700; letter-spacing:1px; }
.room-status.waiting { color:var(--reg-green); }
.room-status.started { color:var(--red); }
.room-card-mid { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.role-chip { font-size:10px; font-weight:700; letter-spacing:.5px; padding:3px 8px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.12); border-radius:4px; color:var(--muted); }
.room-card-bot { display:flex; align-items:center; justify-content:space-between; }
.room-players { font-size:12px; color:var(--muted); }
.room-type-badge { font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:10px; }
.room-type-badge.public { background:rgba(46,204,113,.15); color:var(--green-bright); }
.room-type-badge.private { background:rgba(52,152,219,.15); color:var(--blue); }
.room-type-badge.vip { background:rgba(243,156,18,.15); color:var(--gold); }
.create-room-btn { width:100%; padding:16px; background:var(--accent); border:none; border-radius:8px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:white; cursor:pointer; margin-top:8px; box-shadow:0 3px 12px rgba(0,0,0,.35); }

/* ── PROFILE PAGE ────────────────────── */
.profile-top { display:flex; flex-direction:column; align-items:center; gap:8px; padding:20px 16px; background:var(--header); }
.profile-pfp-ring { width:90px; height:90px; border-radius:50%; border:2px solid rgba(45,106,79,.6); display:flex; align-items:center; justify-content:center; }
.profile-pfp { width:76px; height:76px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:36px; }
.profile-uname { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; }
.profile-quote { font-size:13px; color:var(--muted); font-style:italic; text-align:center; max-width:280px; }
.profile-lv { display:flex; align-items:center; gap:8px; width:100%; max-width:280px; }
.profile-tabs { display:flex; width:100%; border-bottom:2px solid var(--header-border); background:var(--header); }
.profile-tab { flex:1; padding:12px; text-align:center; font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; }
.profile-tab.active { color:var(--accent-bright); border-bottom-color:var(--accent-bright); }
.profile-tab-content { display:none; padding:16px; }
.profile-tab-content.active { display:block; }
.stat-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--card-border); }
.stat-label { font-size:14px; color:var(--muted); font-weight:600; letter-spacing:.5px; }
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; }
.badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.badge-item { aspect-ratio:1; background:var(--card); border:1px solid var(--card-border); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-size:28px; }
.badge-item span { font-size:10px; color:var(--muted); letter-spacing:.5px; font-weight:700; }
.action-btns { display:flex; gap:8px; margin-top:8px; }
.action-btn { flex:1; padding:10px; background:var(--card); border:1px solid var(--card-border); border-radius:8px; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text); cursor:pointer; transition:all .2s; }
.action-btn:active { border-color:var(--accent); color:var(--accent-bright); }
.action-btn.danger { color:var(--red); borde
